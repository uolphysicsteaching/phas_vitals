name: phas_vitals_test
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python>=3.10

  # Testing framework
  - pytest>=7.0.0
  - pytest-cov
  - coverage

  # Django and pytest-django
  - django>=4.2,<5.0
  - pip

  # Core scientific packages
  - numpy>=1.20.0
  - pandas>=1.3.0
  - matplotlib>=3.5.0
  
  # Date/time utilities
  - python-dateutil>=2.8.0
  - pytz>=2021.1
  
  # Other core dependencies
  - six>=1.16.0
  - openpyxl>=3.0.0

  # Celery for async tasks
  - celery>=5.2.0

  # Install remaining packages via pip
  - pip:
    - pytest-django>=4.5.0
    - django-constance>=2.9.0
    - django-sitetree>=1.15.0
    - celery-batches>=0.8.0
    - whitenoise>=6.0.0
    - jsondatetime>=1.0.0
    - django-tinymce>=3.5.0
    - django-import-export>=3.0.0
    - django-autocomplete-light>=3.9.0
    - azure-storage-blob>=12.0.0
    - djangorestframework
    - django-filter
    - django-tables2
