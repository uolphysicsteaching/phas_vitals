{% extends "base.html" %}
{% load tutorial_tags %}
{% block title %}
    {{ block.super }} Summary Score Stats
{% endblock title %}
{% load django_bootstrap5 %}
{% block content %}
    <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-summary-tab" data-bs-toggle="pill" data-bs-target="#pills-summary" type="button" role="tab" aria-controls="pills-summary" aria-selected="true">Summary Scores</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-activity-tab" data-bs-toggle="pill" data-bs-target="#pills-activity" type="button" role="tab" aria-controls="pills-activity" aria-selected="true">Overall</button>
        </li>
        {% for cat in categories %}
            <li class="nav-item" role="presentation">
                <button class="nav-link"
                        id="{{ cat.module.code }}-{{ cat.label }}-tab"
                        data-bs-toggle="pill"
                        data-bs-target="#pills-{{ cat.mpodule.code }}-{{ cat.label }}"
                        type="button" role="tab"
                        aria-controls="pills-{{ cat.module.cpde}}-{{ cat.label }}"
                        aria-selected="false">{{ cat.module.code }}:{{ cat.label }}</button>
            </li>
        {% endfor %}
    </ul>
    <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade show active" id="pills-summary" role="tabpanel" aria-labelledby="pills-summary-tab">
            <div class="table-responsive">
                <img class="plot"  src='{{ plot.data|safe }}' alt="{{ plot.alt|safe }}" />
            </div>
        </div>
        <div class="tab-pane fade" id="pills-activity" role="tabpanel" aria-labelledby="pills-activity-tab">
            <div class="table-responsive">
                <img class="plot"  src='{{ activity_score_plot.data|safe }}' alt="{{ activity_score_plot.alt|safe }}" />
            </div>
        </div>
        {% for cat in categories %}
            <div class="tab-pane fade"
                 id="pills-{{ cat.mpodule.code }}-{{ cat.label }}"
                 role="tabpanel"
                 aria-labelledby="pills-{{ cat.mpodule.code }}-{{ cat.label }}-tab">
                <div class="table-responsive">
                    <img class="plot"  src='{{ cat.plot.data|safe }}' alt="{{ cat.plot.alt|safe }}" />
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
