[pytest]
DJANGO_SETTINGS_MODULE = phas_vitals.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
django_find_project = false
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --reuse-db
testpaths = apps
markers =
    unit: Unit tests for models and utilities
    integration: Integration tests for views and forms
    slow: Tests that take a long time to run
